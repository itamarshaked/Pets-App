name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Run Bandit security scan
        run: |
          bandit -r app

      - name: Run dependency vulnerability scan
        run: |
          pip-audit

      - name: Build Docker image
        run: |
          docker build -t pet-app:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pet-app:ci
          format: table
          exit-code: "1"	# בייצור צריך להיות על 1 כדי לעצור תהליכים ולא 0 שרת מתריע
          severity: CRITICAL
          ignore-unfixed: true